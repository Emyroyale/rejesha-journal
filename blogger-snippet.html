<!--
  REJESHA JOURNAL - HERO SECTION
  Paste into: Blogger > Layout > Add Gadget > HTML/JavaScript (sidebar or anywhere)
  Leave Title blank. Save.
  This script finds the existing .rj-hero and replaces it with the new design.
-->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,800;1,700;1,800&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">

<script>
(function(){
  function init(){

    /* ── 1. Inject global CSS overrides ── */
    var style = document.createElement('style');
    style.textContent = [

      /* Dark body */
      'html,body{background:#080808!important;}',

      /* Star canvas fixed behind everything */
      '#rj-star-canvas{position:fixed;top:0;left:0;width:100vw;height:100vh;pointer-events:none;z-index:0;}',

      /* Override existing .rj-hero to be our dark full-height hero */
      '.rj-hero{',
        'position:relative!important;',
        'background:#080808!important;',
        'min-height:100vh!important;',
        'width:100%!important;',
        'display:flex!important;',
        'flex-direction:column!important;',
        'align-items:center!important;',
        'justify-content:center!important;',
        'text-align:center!important;',
        'padding:100px 24px 70px!important;',
        'overflow:hidden!important;',
        'box-sizing:border-box!important;',
        'font-family:Montserrat,sans-serif!important;',
        'z-index:1!important;',
      '}',

      /* Warm cream spotlight */
      '.rj-hero::before{content:"";position:absolute;inset:0;',
        'background:radial-gradient(ellipse 70% 60% at 50% 48%,rgba(242,235,218,0.13) 0%,rgba(242,235,218,0.06) 40%,transparent 70%);',
        'pointer-events:none;z-index:0;}',

      /* Ambient orbs */
      '.rj-orb{position:absolute;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0;}',
      '.rj-orb-g1{width:500px;height:500px;background:radial-gradient(circle,rgba(0,102,49,.18) 0%,transparent 70%);top:-160px;right:-100px;animation:rjOrb 10s ease-in-out infinite;}',
      '.rj-orb-g2{width:300px;height:300px;background:radial-gradient(circle,rgba(0,102,49,.12) 0%,transparent 70%);bottom:-80px;left:-60px;animation:rjOrb 13s ease-in-out infinite reverse;}',
      '.rj-orb-r{width:260px;height:260px;background:radial-gradient(circle,rgba(200,0,30,.14) 0%,transparent 70%);bottom:15%;right:10%;animation:rjOrb 9s ease-in-out 2s infinite;}',
      '.rj-orb-c{width:400px;height:400px;background:radial-gradient(circle,rgba(242,235,218,.09) 0%,transparent 70%);top:30%;left:50%;transform:translateX(-50%);}',
      '@keyframes rjOrb{0%,100%{transform:translateY(0) scale(1)}33%{transform:translateY(-22px) scale(1.04)}66%{transform:translateY(10px) scale(.97)}}',

      /* Content */
      '.rj-new-content{position:relative;z-index:2;max-width:780px;width:100%;}',

      /* Badge */
      '.rj-badge{display:inline-flex;align-items:center;gap:10px;border:1px solid rgba(0,102,49,.55);color:#2db36e;font-size:10px;font-weight:700;letter-spacing:3.5px;text-transform:uppercase;padding:9px 22px;margin-bottom:38px;opacity:0;animation:rjFadeDown .9s ease .2s both;}',
      '.rj-badge::before,.rj-badge::after{content:"";display:inline-block;width:16px;height:1px;background:rgba(0,102,49,.5);}',

      /* Title */
      '.rj-new-title{font-family:"Playfair Display",Georgia,serif!important;font-size:clamp(54px,9vw,98px)!important;font-weight:800!important;color:#f5f0e8!important;line-height:1.0!important;letter-spacing:-1px!important;margin:0 0 6px!important;opacity:0;animation:rjFadeUp 1s ease .4s both;}',
      '.rj-new-title em{font-style:italic!important;color:#C8001E!important;display:inline-block;position:relative;text-shadow:0 0 60px rgba(200,0,30,.35);}',
      '.rj-new-title em::after{content:"";position:absolute;bottom:6px;left:0;width:100%;height:2px;background:linear-gradient(90deg,transparent,rgba(200,0,30,.7),transparent);animation:rjShimmer 3s ease-in-out infinite;}',
      '@keyframes rjShimmer{0%{opacity:.3;transform:scaleX(.4)}50%{opacity:1;transform:scaleX(1)}100%{opacity:.3;transform:scaleX(.4)}}',

      /* Tagline */
      '.rj-tagline{display:block;font-size:clamp(10px,1.3vw,13px);font-weight:600;letter-spacing:5px;text-transform:uppercase;color:rgba(245,240,232,.3);margin-bottom:22px;opacity:0;animation:rjFadeUp 1s ease .55s both;}',

      /* Rule */
      '.rj-rule{display:flex;align-items:center;justify-content:center;gap:14px;margin:0 auto 28px;opacity:0;animation:rjFadeUp 1s ease .65s both;}',
      '.rj-rule-line{width:55px;height:1px;}',
      '.rj-rule-line:first-child{background:linear-gradient(90deg,transparent,rgba(245,240,232,.25));}',
      '.rj-rule-line:last-child{background:linear-gradient(90deg,rgba(245,240,232,.25),transparent);}',
      '.rj-rule-dot{width:5px;height:5px;border-radius:50%;background:#C8001E;box-shadow:0 0 10px rgba(200,0,30,.7);}',

      /* Typewriter */
      '.rj-tw-wrap{height:46px;display:flex;align-items:center;justify-content:center;margin-bottom:28px;opacity:0;animation:rjFadeUp 1s ease .8s both;}',
      '.rj-tw{font-size:clamp(16px,2.5vw,22px);font-weight:300;color:rgba(245,240,232,.75);letter-spacing:2px;}',
      '.rj-cursor{display:inline-block;width:2px;height:1.1em;background:#2db36e;margin-left:3px;vertical-align:middle;border-radius:1px;animation:rjBlink .85s step-end infinite;}',
      '@keyframes rjBlink{0%,100%{opacity:1}50%{opacity:0}}',

      /* Subtitle */
      '.rj-sub{font-size:clamp(13px,1.7vw,15px)!important;font-weight:300!important;color:rgba(245,240,232,.4)!important;line-height:2!important;max-width:420px!important;margin:0 auto 52px!important;letter-spacing:.5px!important;opacity:0;animation:rjFadeUp 1s ease 1s both;}',

      /* Buttons */
      '.rj-cta{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;opacity:0;animation:rjFadeUp 1s ease 1.2s both;}',
      '.rj-btn-a{display:inline-block!important;background:#006631!important;color:#fff!important;font-family:Montserrat,sans-serif!important;font-size:11px!important;font-weight:700!important;letter-spacing:2.5px!important;text-transform:uppercase!important;padding:16px 40px!important;text-decoration:none!important;transition:all .25s;}',
      '.rj-btn-a:hover{background:#00501f!important;transform:translateY(-2px);box-shadow:0 12px 30px rgba(0,102,49,.35);}',
      '.rj-btn-b{display:inline-block!important;background:transparent!important;color:rgba(245,240,232,.8)!important;font-family:Montserrat,sans-serif!important;font-size:11px!important;font-weight:600!important;letter-spacing:2.5px!important;text-transform:uppercase!important;padding:15px 38px!important;border:1px solid rgba(245,240,232,.2)!important;text-decoration:none!important;transition:all .25s;}',
      '.rj-btn-b:hover{border-color:rgba(200,0,30,.6)!important;color:#e8605a!important;transform:translateY(-2px);}',

      /* Scroll indicator */
      '.rj-scroll{position:absolute;bottom:44px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:8px;z-index:2;opacity:0;animation:rjFadeUp 1s ease 1.8s both;}',
      '.rj-scroll-label{font-size:9px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:rgba(245,240,232,.2);}',
      '.rj-scroll-line{width:1px;height:42px;background:linear-gradient(to bottom,rgba(0,102,49,.7),transparent);animation:rjScrollDrop 2s ease-in-out infinite;}',
      '@keyframes rjScrollDrop{0%{transform:scaleY(0);transform-origin:top}50%{transform:scaleY(1);transform-origin:top}51%{transform:scaleY(1);transform-origin:bottom}100%{transform:scaleY(0);transform-origin:bottom}}',

      /* Marquee */
      '.rj-marquee-wrap{position:absolute;bottom:0;left:0;right:0;height:34px;background:rgba(0,102,49,.05);border-top:1px solid rgba(0,102,49,.12);overflow:hidden;display:flex;align-items:center;z-index:2;}',
      '.rj-marquee{display:flex;animation:rjScroll 30s linear infinite;white-space:nowrap;}',
      '.rj-mq-item{font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:rgba(45,179,110,.5);padding:0 28px;}',
      '.rj-mq-dot{color:rgba(200,0,30,.4);font-size:12px;line-height:34px;}',
      '@keyframes rjScroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}',

      /* Entrance animations */
      '@keyframes rjFadeDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}',
      '@keyframes rjFadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}',

      /* Responsive */
      '@media(max-width:640px){.rj-hero{padding:110px 20px 90px!important;}.rj-new-title{font-size:46px!important;}.rj-cta{flex-direction:column;align-items:center;}}'

    ].join('');
    document.head.appendChild(style);

    /* ── 2. Inject star canvas into body ── */
    var canvas = document.createElement('canvas');
    canvas.id = 'rj-star-canvas';
    document.body.insertBefore(canvas, document.body.firstChild);

    /* ── 3. Replace existing .rj-hero content ── */
    var hero = document.querySelector('.rj-hero');
    if(hero){
      hero.innerHTML =
        '<div class="rj-orb rj-orb-g1"></div>' +
        '<div class="rj-orb rj-orb-g2"></div>' +
        '<div class="rj-orb rj-orb-r"></div>' +
        '<div class="rj-orb rj-orb-c"></div>' +
        '<div class="rj-new-content">' +
          '<div class="rj-badge">Kenyan Diaspora &mdash; U.S. Edition</div>' +
          '<h1 class="rj-new-title">The Rejesha<br><em>Journal</em></h1>' +
          '<span class="rj-tagline">Real Stories &bull; Real Lives &bull; Life Ya Majuu</span>' +
          '<div class="rj-rule">' +
            '<div class="rj-rule-line"></div>' +
            '<div class="rj-rule-dot"></div>' +
            '<div class="rj-rule-line"></div>' +
          '</div>' +
          '<div class="rj-tw-wrap">' +
            '<span class="rj-tw"><span id="rj-tw-text"></span><span class="rj-cursor"></span></span>' +
          '</div>' +
          '<p class="rj-sub">Stories from the Kenyan diaspora in America.<br>Immigration. Identity. Life Ya Majuu.</p>' +
          '<div class="rj-cta">' +
            '<a href="/search/label/Immigration" class="rj-btn-a">Read Stories</a>' +
            '<a href="https://rejesha.store" class="rj-btn-b" target="_blank">Shop Rejesha &#8594;</a>' +
          '</div>' +
        '</div>' +
        '<div class="rj-scroll">' +
          '<span class="rj-scroll-label">Scroll</span>' +
          '<div class="rj-scroll-line"></div>' +
        '</div>' +
        '<div class="rj-marquee-wrap" aria-hidden="true">' +
          '<div class="rj-marquee">' +
            '<span class="rj-mq-item">Immigration Reality</span><span class="rj-mq-dot">&#10022;</span>' +
            '<span class="rj-mq-item">Career &amp; Money</span><span class="rj-mq-dot">&#10022;</span>' +
            '<span class="rj-mq-item">Kenyan Diaspora</span><span class="rj-mq-dot">&#10022;</span>' +
            '<span class="rj-mq-item">Life Ya Majuu</span><span class="rj-mq-dot">&#10022;</span>' +
            '<span class="rj-mq-item">You Belong Here</span><span class="rj-mq-dot">&#10022;</span>' +
            '<span class="rj-mq-item">Culture &amp; Identity</span><span class="rj-mq-dot">&#10022;</span>' +
            '<span class="rj-mq-item">Finance &amp; Stability</span><span class="rj-mq-dot">&#10022;</span>' +
            '<span class="rj-mq-item">Immigration Reality</span><span class="rj-mq-dot">&#10022;</span>' +
            '<span class="rj-mq-item">Career &amp; Money</span><span class="rj-mq-dot">&#10022;</span>' +
            '<span class="rj-mq-item">Kenyan Diaspora</span><span class="rj-mq-dot">&#10022;</span>' +
            '<span class="rj-mq-item">Life Ya Majuu</span><span class="rj-mq-dot">&#10022;</span>' +
            '<span class="rj-mq-item">You Belong Here</span><span class="rj-mq-dot">&#10022;</span>' +
            '<span class="rj-mq-item">Culture &amp; Identity</span><span class="rj-mq-dot">&#10022;</span>' +
            '<span class="rj-mq-item">Finance &amp; Stability</span><span class="rj-mq-dot">&#10022;</span>' +
          '</div>' +
        '</div>';
    }

    /* ── 4. Typewriter ── */
    var phrases = [
      'You belong here.',
      'Real stories. Real lives.',
      'Immigration. Identity.',
      'Life Ya Majuu.',
      'Rooted. Rising. Together.',
      'From 254, with love.',
      'Career. Culture. Community.',
      'Home is where you carry it.'
    ];
    var el = document.getElementById('rj-tw-text');
    var pi=0, ci=0, erasing=false;
    function tick(){
      var p = phrases[pi];
      if(!erasing){
        ci++; el.textContent = p.slice(0,ci);
        if(ci===p.length){ erasing=true; return setTimeout(tick,2200); }
        return setTimeout(tick,80);
      } else {
        ci--; el.textContent = p.slice(0,ci);
        if(ci===0){ erasing=false; pi=(pi+1)%phrases.length; return setTimeout(tick,400); }
        return setTimeout(tick,40);
      }
    }
    setTimeout(tick, 1000);

    /* ── 5. Star field ── */
    var ctx = canvas.getContext('2d');
    var stars = [];
    function resize(){
      canvas.width  = window.innerWidth  || 1200;
      canvas.height = window.innerHeight || 800;
      build();
    }
    function build(){
      var n = Math.floor((canvas.width * canvas.height) / 4800);
      stars = [];
      for(var i=0; i<n; i++){
        var t = Math.random();
        stars.push({
          x:  Math.random()*canvas.width,
          y:  Math.random()*canvas.height,
          r:  Math.random()*1.5+0.2,
          a:  Math.random()*0.6+0.15,
          ph: Math.random()*Math.PI*2,
          sp: Math.random()*0.015+0.004,
          c:  t<0.55?'w':t<0.85?'g':'r'
        });
      }
    }
    function draw(){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      stars.forEach(function(s){
        s.ph+=s.sp;
        var a=s.a*(0.6+0.4*Math.sin(s.ph));
        ctx.beginPath();
        ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
        if(s.c==='w')      ctx.fillStyle='rgba(245,240,232,'+a+')';
        else if(s.c==='g') ctx.fillStyle='rgba(45,179,110,'+(a*0.7)+')';
        else               ctx.fillStyle='rgba(200,0,30,'+(a*0.55)+')';
        ctx.fill();
      });
      requestAnimationFrame(draw);
    }
    resize();
    window.addEventListener('resize', resize);
    draw();

  } // end init()

  /* Run after DOM is ready */
  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

})();
</script>
